name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the OIDC identity
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          node-version: 22
        # Auto-detects pnpm (pnpm-lock.yaml), installs, runs `astro build`,
        # and uploads ./dist as the Pages artifact. Node 22 is required by
        # the pinned pnpm@11 (needs >= 22.13).

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
